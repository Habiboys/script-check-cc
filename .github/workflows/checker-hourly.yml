name: Student Checker Hourly

on:
  schedule:
    - cron: "0 * * * *"
      timezone: Asia/Jakarta
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checker
        run: node index.js --sheets
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          INPUT_SPREADSHEET_ID: ${{ secrets.INPUT_SPREADSHEET_ID }}
          RESULT_SPREADSHEET_ID: ${{ secrets.RESULT_SPREADSHEET_ID }}
